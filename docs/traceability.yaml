  - id: hide-from-user
    name: "{{hideFromUser:}} transform"
    notes: >
      wraps content in <details><summary>▸</summary>…</details> (no class, keeps LLM-visible markup minimal);
      style.css targets .mes_text details > summary to style the toggle (opacity, no marker);
      details (block-level) used so multi-paragraph content with blank lines works (showdown passes block HTML raw);
      user can click the ▸ toggle to reveal content; LLM still receives the raw HTML in context via msg.mes;
      works in any string field (Principle 13)
