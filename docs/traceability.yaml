# ─── TEMPLATE VARIABLES ─────────────────────────────────────────────────────
# No `export` or `schema` columns — these appear inside template strings, not
# as serialized fields.

template-variables:

  - id: variable-scoping
    name: "ruleset-scoped turn variables and $ global prefix"
    notes: >
      Turn variables are scoped to their ruleset by default; a name written in
      ruleset A is invisible to rules in ruleset B. Prefixing a name with $ (e.g. $count)
      makes it global — readable and writable across all rulesets. The rule card shows a
      warning banner when action configs reference variables that exist in another ruleset
      but lack the $ prefix. The variable picker omits out-of-scope names and shows
      $ globals in a separate green-chip section.
    coverage:
      test:       { file: tests/turn-vars.test.js,  touched: 2026-06-21 }
      syntax:     { file: docs/ruleset-syntax.md,   touched: 2026-06-21 }
      user-guide: { file: docs/user-guide.md,       touched: 2026-06-21 }
      cheatsheet: { file: settings/panel.js,        touched: 2026-06-21 }
      var-picker: { file: actions/var-legend.js,    touched: 2026-06-21 }
      examples:   { file: missing }

  - id: system-vars
    name: "system variables — {{keyword}}, {{up-to}}, {{paragraph}}, {{message}}"
