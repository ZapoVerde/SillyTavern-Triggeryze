# Triggeryze Feature Traceability Matrix
#
# LLM USAGE: When you touch any feature listed here, check every coverage item
# for that feature. Update the `touched` date on each artifact you verify or
# modify. A stale `touched` date relative to the others in the same feature is
# a coverage gap — flag it to the user before closing the task.
#
# Coverage areas:
#   test       — tests/ directory (unit / integration)
#   syntax     — docs/ruleset-syntax.md (JSON format reference)
#   user-guide — docs/user-guide.md (conceptual + UI walkthrough)
#   cheatsheet — settings/panel.js, "Variables and functions cheatsheet" section
#   var-picker — actions/var-legend.js, inline chip legend rendered above action prompt fields
#   export     — settings/format.js (import/export boundary)
#   schema     — docs/triggers.schema.json (machine-readable format spec)
#   examples   — docs/examples/ (importable example rulesets that use this feature)
#
# `cheatsheet` only applies to template-side features (variables, transforms,
# lorebook/PS queries, math, conditionals, mapLines).
# `var-picker` only applies to features that have dedicated chips in the inline
# variable legend. Not every feature needs a chip.
# `export` and `schema` only apply to triggers and actions (serialized fields).
# `examples` — example files are optional for any feature. `missing` means no example
# file currently exercises this feature; that is not a required gap. The entry must
# be updated to list the file(s) when an example is added that covers the feature.
# Omitted key = not applicable for that feature. A YAML flow sequence means multiple
# example files cover it — all must be reviewed when the feature changes.
#
# `examples.validated` — date a human ran the example ruleset in ST and confirmed
# the feature behaved correctly (badges fired, toasts showed expected output). This
# is distinct from automated tests: it is a user sign-off on real ST behaviour.
# `missing` means the ruleset has not been manually verified in ST.
# A stale validated date (older than touched) means the file changed since it was
# last confirmed to work — re-run before relying on it.
#
# Special values:
#   missing    — feature exists in engine but is absent from this artifact (gap)
#   undocumented — present in code/tests but deliberately or accidentally absent
#                  from user-facing docs; note explains which

