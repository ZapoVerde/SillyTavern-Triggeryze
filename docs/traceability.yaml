  - id: match-transform
    name: "{{match: /pattern/flags: val}} transform"
    notes: >
      regex extraction from a resolved variable; /pattern/flags syntax required (slashes bound the pattern,
      so colons inside the regex are safe); returns capture group 1 if present, full match if no groups,
      empty string on no match or bad pattern; runs after all variable substitution; intended for parsing
      one intermediate turn variable into another via compose
    coverage:
      test:       { file: tests/transforms.test.js, touched: 2026-06-26 }
